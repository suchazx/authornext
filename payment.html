<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - AuthorNext</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin:0; padding:0; font-family:'Roboto', sans-serif;}
body { background-color:#fdfdfd; color:#333; line-height:1.6;}
:root {
    --primary-color: #3a5a40;
    --secondary-color: #1a1a1a;
    --accent-color: #6b8c7c;
    --text-light: #fff;
    --text-dark: #111;
}
.container {
    max-width:500px;
    margin:80px auto;
    padding:30px;
    border-radius:10px;
    background-color:#f0f7f3;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
h1 { color:var(--primary-color); margin-bottom:15px;}
p { font-size:1rem; margin-bottom:25px;}
button {
    background-color: var(--primary-color);
    color: var(--text-light);
    border:none;
    padding:14px 35px;
    font-size:1rem;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s transform,0.3s box-shadow,0.3s background-color;
}
button:hover {
    background-color: var(--accent-color);
    transform: scale(1.05);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<div class="container">
    <h1>AuthorNext Course</h1>
    <p>Price: ₹500</p>
    <button id="rzp-button1">Pay Now</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "YOUR_KEY_ID", // Replace with your Razorpay Key ID
    "amount": "50000", // ₹500 in paise
    "currency": "INR",
    "name": "AuthorNext",
    "description": "Course Payment",
    "handler": function (response){
        alert("Payment Successful! Payment ID: " + response.razorpay_payment_id);
        window.location.href = "thankyou.html";
    },
    "theme": { "color": "#3a5a40" }
};
var rzp1 = new Razorpay(options);
document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
</script>

</body>
</html>
